// ── Portfolio ──
async function loadPortfolio() {
  try {
    const [portfolioResp, signalsResp] = await Promise.all([
      fetch('/api/portfolio'),
      fetch('/api/portfolio/signals')
    ]);
    const pj = await portfolioResp.json();
    const sj = await signalsResp.json();
    if (pj.code !== 0) { notify('加载持仓失败', 'error'); return; }
    const data = pj.data;
    // 合并卖出信号到持仓数据
    if (sj.code === 0 && sj.data) {
      data.sellSignals = sj.data.signals || [];
      data.signalSummary = {
        urgent_count: sj.data.urgent_count || 0,
        sell_count: sj.data.sell_count || 0,
        reduce_count: sj.data.reduce_count || 0,
        total_positions: sj.data.total_positions || 0
      };
    }
    lastPortfolioData = data;
    renderPortfolio(data);
    document.getElementById('positionBadge').textContent = data.account.position_count || 0;
    updateSignalSummary(data.signalSummary);
  } catch (e) {
    notify('加载持仓失败: ' + e.message, 'error');
  }
}

function updateSignalSummary(summary) {
  const el = document.getElementById('sigSummary');
  if (!el || !summary) return;
  el.innerHTML = `
    ${summary.urgent_count > 0 ? `<span class="sig-pill" style="background:rgba(218,54,51,0.15);color:#f85149;border:1px solid #da3633">🚨 紧急卖出 ${summary.urgent_count} 只</span>` : ''}
    ${summary.sell_count > 0 ? `<span class="sig-pill" style="background:rgba(248,81,73,0.12);color:#ffa657;border:1px solid #ffa657">🔴 建议卖出 ${summary.sell_count} 只</span>` : ''}
    ${summary.reduce_count > 0 ? `<span class="sig-pill" style="background:rgba(255,166,87,0.12);color:#ffa657;border:1px solid rgba(255,166,87,0.4)">⚠️ 考虑减仓 ${summary.reduce_count} 只</span>` : ''}
    ${summary.total_positions > 0 && summary.urgent_count === 0 && summary.sell_count === 0 && summary.reduce_count === 0 ? `<span class="sig-pill" style="background:rgba(63,185,80,0.1);color:var(--green);border:1px solid rgba(63,185,80,0.3)">💤 持仓健康，继续持有</span>` : ''}
  `;
}

// ── 卖出信号分析（手动刷新用） ──
async function loadSellSignals() {
  const btn = document.getElementById('analyzeBtn');
  if (btn) {
    btn.classList.add('loading');
    btn.textContent = '⏳ 分析中...';
  }
  try {
    const resp = await fetch('/api/portfolio/signals');
    const j = await resp.json();
    if (j.code !== 0) throw new Error(j.msg || '分析失败');
    const data = j.data;
    updateSignalSummary({
      urgent_count: data.urgent_count || 0,
      sell_count: data.sell_count || 0,
      reduce_count: data.reduce_count || 0,
      total_positions: data.total_positions || 0
    });
    // 重新加载持仓以更新每行的信号展示
    await loadPortfolio();
    if (btn) {
      btn.classList.remove('loading');
      btn.textContent = '🔮 重新分析';
    }
  } catch(e) {
    if (btn) {
      btn.classList.remove('loading');
      btn.textContent = '🔮 重试分析';
    }
    notify('卖出信号分析失败: ' + e.message, 'error');
  }
}

// ── 持仓买入策略标签 ──────────────────────────────────────────────
function renderBuyStrategyTags(buyStrategyStr, code) {
  if (!buyStrategyStr) return '<span style="color:var(--muted);font-size:12px">—</span>';
  const ids = buyStrategyStr.split(',').map(s => s.trim()).filter(Boolean);
  if (ids.length === 0) return '<span style="color:var(--muted);font-size:12px">—</span>';

  // 从最新筛选结果中查找该股票各策略的评分
  const strategyScores = {};
  if (lastResult && lastResult.comprehensive_picks && code) {
    const pick = lastResult.comprehensive_picks.find(p => p.ts_code === code);
    if (pick && pick.strategies_hit) {
      pick.strategies_hit.forEach(sh => {
        strategyScores[sh.id] = sh.score;
      });
    }
  }

  const hasScoreInfo = Object.keys(strategyScores).length > 0;
  const MIN_SCORE = 40;

  const tags = ids.map(id => {
    const name = strategyNameMap[id] || id;
    const score = strategyScores[id];
    const hasScore = score !== undefined;
    const isExpired = hasScoreInfo && !hasScore; // 有全局评分信息但本策略无评分 = 已失效
    const isWeak = hasScore && score < MIN_SCORE; // 评分过低

    // 根据状态给标签上色
    let scoreColor, scoreBg, scoreBorder;
    if (isExpired || isWeak) {
      // 已失效/评分过低 → 灰色
      scoreColor = '#8b949e';
      scoreBg = 'rgba(139,148,158,0.08)';
      scoreBorder = 'rgba(139,148,158,0.2)';
    } else if (hasScore) {
      if (score >= 60) {
        scoreColor = '#3fb950';
        scoreBg = 'rgba(63,185,80,0.12)';
        scoreBorder = 'rgba(63,185,80,0.3)';
      } else if (score >= 50) {
        scoreColor = '#d29922';
        scoreBg = 'rgba(210,153,34,0.12)';
        scoreBorder = 'rgba(210,153,34,0.3)';
      } else {
        scoreColor = '#ffa657';
        scoreBg = 'rgba(255,166,87,0.12)';
        scoreBorder = 'rgba(255,166,87,0.3)';
      }
    } else {
      // 无评分信息（未运行筛选）→ 默认蓝色
      scoreColor = 'var(--accent)';
      scoreBg = 'rgba(88,166,255,0.1)';
      scoreBorder = 'rgba(88,166,255,0.25)';
    }

    // 超长名称截断
    const short = name.length > 4 ? name.substring(0, 3) + '…' : name;
    const display = hasScore ? `${short} ${score}` : short;
    let title;
    if (isExpired) title = `${name} · 已不在当前筛选中`;
    else if (isWeak) title = `${name} · 符合度 ${score}分（低于阈值）`;
    else if (hasScore) title = `${name} · 符合度 ${score}分`;
    else title = name;

    return `<span class="buy-strategy-tag" title="${title}" style="background:${scoreBg};color:${scoreColor};border-color:${scoreBorder};${isExpired||isWeak?'opacity:0.6;text-decoration:line-through':''}">${display}</span>`;
  }).filter(Boolean);

  if (tags.length === 0) {
    return '<span style="color:var(--muted);font-size:12px">—</span>';
  }
  return `<div class="buy-strategy-tag-wrap">${tags.join('')}</div>`;
}

// ── 持仓综合状态卡片 ──────────────────────────────────────────────
function renderPositionStatus(code, buyStrategyStr) {
  const pick = lastResult && lastResult.comprehensive_picks
    ? lastResult.comprehensive_picks.find(p => p.ts_code === code)
    : null;

  const riskColorMap = {
    safe: '#3fb950',
    watch: '#d29922',
    conflict: '#ffa657',
    high_risk: '#f85149',
    unknown: '#8b949e'
  };
  const riskLabelMap = {
    safe: '信号清晰',
    watch: '轻度警示',
    conflict: '买卖分歧',
    high_risk: '风险较高',
    unknown: '未知'
  };

  // 从卖出信号API获取风险数据（如果已加载）
  const sig = lastPortfolioData && lastPortfolioData.sellSignals
    ? lastPortfolioData.sellSignals.find(s => s.code === code)
    : null;
  const riskTag = sig ? sig.risk_tag : (pick ? pick.risk_tag : 'unknown');
  const riskScore = sig ? sig.risk_score : (pick ? pick.risk_score : 0);

  const riskColor = riskColorMap[riskTag] || '#8b949e';
  const riskLabel = riskLabelMap[riskTag] || riskTag;

  let html = `<div style="display:flex;flex-direction:column;gap:3px;font-size:11px">`;

  if (pick) {
    const nStrategies = pick.n_strategies || 0;
    const totalScore = pick.total_score || 0;
    const winRate = pick.win_rate_pct || '0%';
    html += `<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">`;
    html += `<span style="color:var(--accent);font-weight:700">${nStrategies}策略</span>`;
    html += `<span style="color:var(--muted)">·</span>`;
    html += `<span style="color:var(--text)">评分${totalScore}</span>`;
    html += `<span style="color:var(--muted)">·</span>`;
    html += `<span style="color:var(--green)">胜率${winRate}</span>`;
    html += `</div>`;
  } else {
    html += `<div style="color:var(--muted);font-size:11px">未在当前筛选中</div>`;
  }

  html += `<div style="display:flex;gap:5px;align-items:center">`;
  html += `<span style="color:${riskColor};font-weight:600">● ${riskLabel}</span>`;
  if (riskScore > 0) html += `<span style="color:var(--muted)">(${riskScore}分)</span>`;
  html += `</div>`;

  // 买入策略是否仍满足
  if (buyStrategyStr) {
    const buyIds = buyStrategyStr.split(',').map(s => s.trim()).filter(Boolean);
    if (pick && pick.strategies_hit) {
      const stillHitIds = new Set(pick.strategies_hit.map(s => s.id));
      const expired = buyIds.filter(id => !stillHitIds.has(id));
      if (expired.length > 0) {
        const expiredNames = expired.map(id => strategyNameMap[id] || id).join(', ');
        html += `<div style="color:#8b949e;font-size:10px">⚠ 已失效: ${expiredNames}</div>`;
      }
    } else if (buyIds.length > 0) {
      // 没有pick信息，所有策略都可能已失效
      html += `<div style="color:#8b949e;font-size:10px">⚠ 买入策略已不在当前筛选</div>`;
    }
  }

  html += `</div>`;
  return html;
}

function setPortfolioSort(key) {
  if (portfolioSort.key === key) {
    portfolioSort.asc = !portfolioSort.asc;
  } else {
    portfolioSort.key = key;
    portfolioSort.asc = true;
  }
  if (lastPortfolioData) renderPortfolio(lastPortfolioData);
}

function renderPortfolio(data) {
  const acc = data.account;
  let positions = (data.positions || []).slice();
  const stats = data.stats || {};
  const container = document.getElementById('portfolioContent');

  // 持仓排序
  if (portfolioSort.key) {
    positions.sort((a, b) => {
      let av, bv;
      if (portfolioSort.key === 'code') { av = a.code || ''; bv = b.code || ''; }
      else if (portfolioSort.key === 'hold_days') {
        av = a.buy_date ? Math.floor((new Date() - new Date(a.buy_date)) / 86400000) : 0;
        bv = b.buy_date ? Math.floor((new Date() - new Date(b.buy_date)) / 86400000) : 0;
      }
      else { av = a[portfolioSort.key] || 0; bv = b[portfolioSort.key] || 0; }
      if (av < bv) return portfolioSort.asc ? -1 : 1;
      if (av > bv) return portfolioSort.asc ? 1 : -1;
      return 0;
    });
  }
  // 更新排序箭头显示
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  if (portfolioSort.key) {
    const arrowEl = document.getElementById('sort-' + portfolioSort.key);
    if (arrowEl) arrowEl.textContent = portfolioSort.asc ? ' ▲' : ' ▼';
  }
  // 清空独立的卖出信号卡片区域
  const sellContainer = document.getElementById('sellSignalsContent');
  if (sellContainer) sellContainer.innerHTML = '';

  // 账户卡片
  const pnlColor = acc.total_pnl >= 0 ? 'var(--red)' : 'var(--green)';
  const pnlSign = acc.total_pnl >= 0 ? '+' : '';

  let html = `
  <div class="info-grid">
    <div class="info-card">
      <div class="label">💰 总资产</div>
      <div class="value" style="font-size:24px">¥${acc.total_value.toLocaleString('zh-CN', {minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      <div class="sub">初始资金 ¥${acc.initial_cash.toLocaleString()}</div>
    </div>
    <div class="info-card">
      <div class="label">📈 总盈亏</div>
      <div class="value" style="font-size:24px;color:${pnlColor}">${pnlSign}¥${Math.abs(acc.total_pnl).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      <div class="sub" style="color:${pnlColor}">${pnlSign}${acc.total_pnl_pct}%</div>
    </div>
    <div class="info-card">
      <div class="label">📊 持仓市值</div>
      <div class="value" style="font-size:24px">¥${acc.position_value.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      <div class="sub" style="color:${acc.position_pnl>=0?'var(--green)':'var(--red)'}">${acc.position_pnl>=0?'+':''}¥${Math.abs(acc.position_pnl||0).toLocaleString('zh-CN',{minimumFractionDigits:2})} (${acc.position_count}只)</div>
    </div>
    <div class="info-card">
      <div class="label">💵 可用资金</div>
      <div class="value" style="font-size:24px">¥${acc.cash.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
    </div>
  </div>

  <div class="info-grid" style="grid-template-columns: repeat(auto-fill,minmax(150px,1fr))">
    <div class="info-card">
      <div class="label">🎯 交易胜率</div>
      <div class="value" style="color:${stats.win_rate>=50?'var(--green)':'var(--red)'}">${stats.win_rate||0}%</div>
      <div class="sub">${stats.winning_trades||0}胜/${stats.losing_trades||0}负</div>
    </div>
    <div class="info-card">
      <div class="label">💹 平均盈利</div>
      <div class="value" style="color:var(--green)">+¥${(stats.avg_win||0).toLocaleString()}</div>
      <div class="sub">最大单笔 +¥${(stats.max_win||0).toLocaleString()}</div>
    </div>
    <div class="info-card">
      <div class="label">📉 平均亏损</div>
      <div class="value" style="color:var(--red)">-¥${Math.abs(stats.avg_loss||0).toLocaleString()}</div>
      <div class="sub">最大单笔 -¥${Math.abs(stats.max_loss||0).toLocaleString()}</div>
    </div>
    <div class="info-card">
      <div class="label">🏆 已实现盈亏</div>
      <div class="value" style="color:${(stats.total_realized_pnl||0)>=0?'var(--green)':'var(--red)'}">${(stats.total_realized_pnl||0)>=0?'+':'#820'}¥${Math.abs(stats.total_realized_pnl||0).toLocaleString()}</div>
      <div class="sub">${stats.profit_factor||0} 盈亏比</div>
    </div>
  </div>

  <div class="section-title">📋 当前持仓</div>
  `;

  const signalMap = {};
  (data.sellSignals || []).forEach(s => { signalMap[s.code] = s; });

  if (positions.length === 0) {
    html += '<div class="portfolio-empty"><div style="font-size:36px;margin-bottom:8px">💼</div><div>暂无持仓</div><div style="font-size:13px;margin-top:4px">先筛选股票，再点击「买入」开始模拟交易</div></div>';
  } else {
    html += `
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="setPortfolioSort('code')" style="cursor:pointer">股票<span class="sort-arrow" id="sort-code"></span></th>
          <th onclick="setPortfolioSort('avg_cost')" style="cursor:pointer">持仓成本<span class="sort-arrow" id="sort-avg_cost"></span></th>
          <th onclick="setPortfolioSort('current_price')" style="cursor:pointer">最新价<span class="sort-arrow" id="sort-current_price"></span></th>
          <th onclick="setPortfolioSort('position_pnl')" style="cursor:pointer">盈亏金额<span class="sort-arrow" id="sort-position_pnl"></span></th>
          <th onclick="setPortfolioSort('position_pnl_pct')" style="cursor:pointer">盈亏比例<span class="sort-arrow" id="sort-position_pnl_pct"></span></th>
          <th onclick="setPortfolioSort('hold_days')" style="cursor:pointer">持仓天数<span class="sort-arrow" id="sort-hold_days"></span></th>
          <th>买入策略</th>
          <th onclick="setPortfolioSort('current_value')" style="cursor:pointer">市值<span class="sort-arrow" id="sort-current_value"></span></th>
          <th>卖出诊断</th><th>操作</th>
        </tr>
      </thead>
      <tbody>
        ${positions.map(pos => {
          const pnlColor2 = pos.position_pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
          const pnlSign2 = pos.position_pnl >= 0 ? '+' : '';
          const pnlPct = pos.position_pnl_pct || 0;
          const pnlPctColor = pnlPct >= 0 ? 'var(--red)' : 'var(--green)';
          const holdDays = (() => {
            const diff = new Date() - new Date(pos.buy_date);
            return Math.floor(diff / 86400000);
          })();
          const sig = signalMap[pos.code];
          const sellDiag = sig ? renderSellDiag(sig) : '<span style="color:var(--muted);font-size:12px">未分析</span>';
          const actions = renderPositionActions(pos);
          return `
            <tr>
              <td>${stockNameHtml(pos.code, pos.name)}</td>
              <td>¥${(pos.avg_cost||0).toFixed(3)}</td>
              <td class="price">¥${(pos.current_price||0).toFixed(2)}</td>
              <td class="${pnlColor2}" style="font-weight:700">${pnlSign2}¥${Math.abs(pos.position_pnl||0).toLocaleString('zh-CN',{minimumFractionDigits:2})}</td>
              <td><span style="color:${pnlPctColor};font-weight:700">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</span></td>
              <td class="hold-days">${holdDays}天</td>
              <td>${renderBuyStrategyTags(pos.buy_strategy, pos.code)}</td>
              <td>¥${(pos.current_value||0).toLocaleString('zh-CN',{minimumFractionDigits:2})}</td>
              <td>${sellDiag}</td>
              <td style="white-space:nowrap">${actions}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
    </div>
    `;
  }

  // 交易历史
  html += `<div class="section-title" style="margin-top:24px">📜 交易记录</div>`;
  container.innerHTML = html;

  // 异步加载交易历史
  loadTradeHistory();
}

async function loadTradeHistory() {
  const resp = await fetch('/api/portfolio/trades');
  const j = await resp.json();
  if (j.code !== 0) return;
  const trades = j.data || [];
  if (trades.length === 0) {
    document.getElementById('portfolioContent').innerHTML += '<div class="portfolio-empty"><div>暂无交易记录</div></div>';
    return;
  }
  const container = document.getElementById('portfolioContent');
  container.innerHTML += `
    <div class="table-wrap">
    <table>
      <thead>
        <tr><th>时间</th><th>方向</th><th>股票</th><th>价格</th><th>数量</th><th>金额</th><th>盈亏</th><th>持仓天数</th></tr>
      </thead>
      <tbody>
        ${trades.map(t => {
          const isBuy = t.action === 'buy';
          return `
            <tr class="trade-row">
              <td>${(t.timestamp||t.trade_date||'').substring(0,16).replace('T',' ')}</td>
              <td><span class="action ${isBuy?'buy':'sell'}">${isBuy?'买入':'卖出'}</span></td>
              <td>${stockNameHtml(t.code, t.name)}</td>
              <td>¥${(t.price||0).toFixed(2)}</td>
              <td>${(t.shares||0)}股</td>
              <td>¥${(t.amount||0).toLocaleString('zh-CN',{minimumFractionDigits:2})}</td>
              <td style="color:${(t.realized_pnl||0)>=0?'var(--green)':'var(--red)'};font-weight:700">
                ${(t.realized_pnl||0)>=0?'+':''}¥${Math.abs(t.realized_pnl||0).toLocaleString('zh-CN',{minimumFractionDigits:2})}
              </td>
              <td class="hold-days">${t.hold_days||'-'}天</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
    </div>
  `;
}

async function clearStock(code, name) {
  // 自动获取实时最新价用于确认框展示
  let sellPrice = 0;
  try {
    const r = await fetch(`/api/quick_price?code=${code}`);
    const j = await r.json();
    if (j.code === 0) sellPrice = j.data.price;
  } catch (e) {}
  const priceStr = sellPrice > 0 ? `¥${sellPrice.toFixed(2)}` : '实时最新价';
  if (!confirm(`确认清仓 ${name}(${code})？\n结算价格：${priceStr}`)) return;
  const resp = await fetch('/api/portfolio/sell', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, price: 0, note: '清仓' })
  });
  const j = await resp.json();
  if (j.code === 0) { notify(j.data.msg, 'success'); loadPortfolio(); }
  else notify(j.msg || '清仓失败', 'error');
}

async function reduceStock(code, name, maxShares) {
  // 自动获取实时最新价用于确认框展示
  let sellPrice = 0;
  try {
    const r = await fetch(`/api/quick_price?code=${code}`);
    const j = await r.json();
    if (j.code === 0) sellPrice = j.data.price;
  } catch (e) {}
  const priceStr = sellPrice > 0 ? `¥${sellPrice.toFixed(2)}` : '实时最新价';
  const defaultShares = Math.max(100, Math.floor(maxShares / 2 / 100) * 100);
  const input = prompt(`减仓 ${name}(${code})\n结算价格：${priceStr}\n请输入减仓股数（最多 ${maxShares} 股，100股整数倍）：`, defaultShares);
  if (!input) return;
  const shares = parseInt(input, 10);
  if (isNaN(shares) || shares <= 0 || shares > maxShares || shares % 100 !== 0) {
    notify('减仓数量无效，必须是100的整数倍且不超过持仓数量', 'error');
    return;
  }
  const resp = await fetch('/api/portfolio/sell', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, price: 0, shares, note: '减仓' })
  });
  const j = await resp.json();
  if (j.code === 0) { notify(j.data.msg, 'success'); loadPortfolio(); }
  else notify(j.msg || '减仓失败', 'error');
}

// ── Top Tab Switch ──
function switchTopTab(tab) {
  currentTopTab = tab;
  document.getElementById('tabScreen').className = `top-tab ${tab==='screen'?'active':''}`;
  document.getElementById('tabPortfolio').className = `top-tab ${tab==='portfolio'?'active':''}`;
  document.getElementById('screenArea').style.display = tab === 'screen' ? 'block' : 'none';
  document.getElementById('portfolioArea').style.display = tab === 'portfolio' ? 'block' : 'none';
  if (tab === 'portfolio') {
    loadPortfolio();
    // 重置卖出信号区域（下次 loadPortfolio 会自动触发）
  }
  saveUIState();
}

// ── Buy Modal ──
function openBuyModal(code, name, price) {
  currentPrice = price;
  currentName = name;
  document.getElementById('modalCode').value = code;
  document.getElementById('modalStockName').textContent = `${name} (${code})`;
  document.getElementById('modalPrice').value = price > 0 ? price.toFixed(2) : '';
  document.getElementById('modalShares').value = 1;
  updateModalAmount();
  document.getElementById('buyModal').classList.add('show');
}

async function directBuy() {
  const code = document.getElementById('directBuyCode').value.trim();
  if (!code) { notify('请输入股票代码', 'error'); return; }
  try {
    const resp = await fetch('/api/quick_price?code=' + encodeURIComponent(code));
    const j = await resp.json();
    if (j.code !== 0 || !j.data || j.data.price <= 0) {
      notify('无法获取该股票实时价格，请检查代码', 'error');
      return;
    }
    openBuyModal(j.data.code, j.data.name, j.data.price);
    document.getElementById('directBuyCode').value = '';
  } catch (e) {
    notify('查询失败: ' + e.message, 'error');
  }
}

function setShares(n) {
  document.getElementById('modalShares').value = n;
  updateModalAmount();
}

function updateModalAmount() {
  const p = parseFloat(document.getElementById('modalPrice').value) || 0;
  const s = parseInt(document.getElementById('modalShares').value) || 0;
  document.getElementById('modalAmount').textContent = (p * s * 100).toLocaleString('zh-CN', {minimumFractionDigits:2});
}

document.getElementById('modalPrice').addEventListener('input', updateModalAmount);
document.getElementById('modalShares').addEventListener('input', updateModalAmount);

function closeModal() {
  document.getElementById('buyModal').classList.remove('show');
}

async function confirmBuy() {
  const code = document.getElementById('modalCode').value;
  const price = parseFloat(document.getElementById('modalPrice').value);
  const shares = parseInt(document.getElementById('modalShares').value) * 100;

  if (!price || price <= 0) { notify('请输入有效价格', 'error'); return; }
  if (!shares || shares < 100) { notify('买入数量至少1手（100股）', 'error'); return; }

  const resp = await fetch('/api/portfolio/buy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      code, name: currentName, price, shares,
      strategy: (selectedStrategies.size ? [...selectedStrategies].join(',') : 'manual')
    })
  });
  const j = await resp.json();
  if (j.code === 0) {
    notify(j.data.msg, 'success');
    closeModal();
    // 切换到持仓页
    switchTopTab('portfolio');
  } else {
    notify(j.msg || j.data?.msg || '买入失败', 'error');
  }
}

// ── Notify ──
function notify(msg, type = 'success') {
  const el = document.getElementById('notification');
  const icon = type === 'success' ? '✅' : type === 'warn' ? '⚠️' : '❌';
  el.textContent = `${icon} ${msg}`;
  el.className = `notification ${type} show`;
  setTimeout(() => el.className = 'notification', 3500);
}

// ── 下拉框 change 事件持久化 ──
document.getElementById('marketSelect').addEventListener('change', saveUIState);
document.getElementById('topnSelect').addEventListener('change', saveUIState);

// ── Boot ──
init();
</script>
